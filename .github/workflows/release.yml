name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows is intentionally omitted: its build is deferred (Catch2
          # test-discovery runtime). Re-add a windows-latest entry once the
          # native build is unblocked. The release publishes macOS + Linux.
          - os: macos-latest
            cmake_extra: ""
            artifact: cstatic-macos-arm64
          - os: ubuntu-latest
            cmake_extra: ""
            artifact: cstatic-linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release

      # No Test step here: the quality gate lives in build.yml (push workflow),
      # which runs the full ctest suite on the same commit. The release job
      # only builds and uploads binaries so that test-suite flakiness never
      # blocks publication.
      - name: Prepare artifact
        run: |
          cp build/cstatic "${{ matrix.artifact }}"
          strip "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "C-Static ${{ github.ref_name }}"
          body: |
            ## C-Static ${{ github.ref_name }}

            See [README](https://github.com/daveviamedia-code/cstatic#readme) for usage instructions.

            **Binaries:**
            - `cstatic-macos-arm64` — macOS (Apple Silicon)
            - `cstatic-linux-x86_64` — Linux (x86_64)
          files: artifacts/**/*
