<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
    <meta charset="utf-8">
    <title>{{ item.title }} — {{ site.title }}</title>
</head>
<body>
    <h1>{{ item.title }}</h1>
    <p class="price">${{ item.price }}</p>
    <p class="description">{{ item.description }}</p>
    <p class="category">Category: {{ item.category }}</p>
    <a href="/products/">Back to all products</a>
</body>
</html>
