<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <style>body{font-family:system-ui,sans-serif;max-width:40em;margin:2em auto;padding:0 1em;color:#222}a{color:#0066cc}code{background:#f4f4f4;padding:0.2em 0.4em;border-radius:3px}article{line-height:1.6}</style>
</head>
<body>
  <header>
    <h1><a href="/">{{ site.title }}</a></h1>
  </header>
  <article>
    <h2>{{ page.title }}</h2>
    {% if page.date %}<time>{{ page.date }}</time>{% endif %}
    {{ page.content }}
  </article>
</body>
</html>
